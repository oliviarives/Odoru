spring.application.name=odoru

# ---------- Serveur ----------
# Port de l'application (par defaut Spring Boot = 8080)
server.port=9000

# ---------- Base de donnees MySQL ----------
# Lancer MySQL via Docker :
# docker run --name=mysqlodoru -e MYSQL_ROOT_PASSWORD=my-secret-pw -e MYSQL_DATABASE=odoru -p 3306:3306 mysql
spring.datasource.url=jdbc:mysql://localhost:3306/odoru?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=my-secret-pw
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# create-drop : recree le schema a chaque demarrage
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- Securite / JWT ----------
# Cle secrete pour signer les tokens
odoru.jwt.secret=2A462D4A614E645267556B58703273357638792F423F4528482B4D6251655468
# Duree de validite du token en millisecondes (1h)
odoru.jwt.expiration=3600000

# ---------- Swagger / OpenAPI ----------
springdoc.swagger-ui.path=/swagger-ui.html

# ---------- Logs ----------
logging.level.org.example.odoru=DEBUG